<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Page Not Found — MGenie</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      padding: 64px 24px;
      text-align: center;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: #58a6ff;
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-title {
      font-size: 2rem;
      color: #e6edf3;
      margin-bottom: 12px;
    }
    .error-message {
      font-size: 1.05rem;
      color: #8b949e;
      margin-bottom: 32px;
      max-width: 560px;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #238636;
      color: #fff;
      text-decoration: none;
      padding: 13px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      transition: background .15s, transform .1s;
    }
    .btn-home:hover {
      background: #2ea043;
      transform: translateY(-1px);
    }
    .btn-help {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #21262d;
      color: #c9d1d9;
      text-decoration: none;
      padding: 13px 28px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      border: 1px solid #30363d;
      transition: background .15s, border-color .15s, transform .1s;
    }
    .btn-help:hover {
      background: #30363d;
      border-color: #8b949e;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/">M<span>Genie</span></a>
  <div class="nav-links">
    <a href="/guide/">User Guide</a>
    <a href="/docs/">Documentation</a>
    <a href="https://github.com/ampclaw/MGenie">GitHub</a>
  </div>
</nav>

<div class="error-container">
  <div class="error-code">404</div>
  <h1 class="error-title">Page Not Found</h1>
  <p class="error-message">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  
  <div class="error-actions">
    <a href="/" class="btn-home">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="m7.53 1.28-5.25 4.2a.75.75 0 0 0-.25.57v7.95a.75.75 0 0 0 .75.75h3a.75.75 0 0 0 .75-.75v-2.5h1.94v2.5a.75.75 0 0 0 .75.75h3a.75.75 0 0 0 .75-.75V6.05a.75.75 0 0 0-.25-.57l-5.25-4.2Z"/>
      </svg>
      Go Home
    </a>
    <a href="/docs/" class="btn-help">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M0 1.75A.75.75 0 0 1 .75 1h4.253c1.227 0 2.317.59 3 1.501A3.743 3.743 0 0 1 11.006 1h4.245a.75.75 0 0 1 .75.75v10.5a.75.75 0 0 1-.75.75h-4.507a2.25 2.25 0 0 0-1.591.659l-.622.621a.75.75 0 0 1-1.062 0l-.622-.621A2.25 2.25 0 0 0 5.258 13H.75a.75.75 0 0 1-.75-.75Zm7.251 10.324.004-5.073-.002-2.253A2.25 2.25 0 0 0 5.003 2.5H1.5v9h3.757a3.75 3.75 0 0 1 1.994.574ZM8.755 4.75l-.004 7.322a3.752 3.752 0 0 1 1.992-.572H14.5v-9h-3.495a2.25 2.25 0 0 0-2.25 2.25Z"/>
      </svg>
      Documentation
    </a>
  </div>
</div>

<footer>
  <p>© 2026 MGenie. Built for macOS.</p>
  <p><a href="https://github.com/ampclaw/MGenie">GitHub</a> · <a href="https://github.com/ampclaw/MGenie/releases">Releases</a> · <a href="https://github.com/ampclaw/MGenie/issues">Issues</a></p>
</footer>

</body>
</html>
